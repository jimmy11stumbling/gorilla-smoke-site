<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#1a1a1a"/>
  
  <!-- Smoke background patterns -->
  <path d="M0,200 Q300,250 600,150 T1200,200 V630 H0 Z" fill="#2a2a2a" opacity="0.5"/>
  <path d="M0,300 Q400,350 700,250 T1200,300 V630 H0 Z" fill="#3a3a3a" opacity="0.3"/>
  
  <!-- Restaurant name -->
  <text x="600" y="200" font-family="Arial, sans-serif" font-size="80" font-weight="bold" text-anchor="middle" fill="#ffffff">
    GORILLA SMOKE &amp; GRILL
  </text>
  
  <!-- Tagline -->
  <text x="600" y="280" font-family="Arial, sans-serif" font-size="34" text-anchor="middle" fill="#f5a742">
    AUTHENTIC BBQ IN LAREDO, TX
  </text>
  
  <!-- Decorative grill elements -->
  <g transform="translate(360, 380)">
    <rect x="0" y="0" width="480" height="20" rx="5" fill="#555555"/>
    <rect x="0" y="30" width="480" height="20" rx="5" fill="#555555"/>
    <rect x="0" y="60" width="480" height="20" rx="5" fill="#555555"/>
    <rect x="0" y="90" width="480" height="20" rx="5" fill="#555555"/>
    
    <!-- Heat/fire effect -->
    <path d="M50,0 Q70,-20 90,0 T130,0 T170,0 T210,0 T250,0 T290,0 T330,0 T370,0 T410,0 T450,0" fill="none" stroke="#ff7700" stroke-width="8"/>
    <path d="M40,0 Q60,-30 80,0 T120,0 T160,0 T200,0 T240,0 T280,0 T320,0 T360,0 T400,0 T440,0" fill="none" stroke="#ff4500" stroke-width="5"/>
  </g>
  
  <!-- Website URL -->
  <text x="600" y="560" font-family="Arial, sans-serif" font-size="26" text-anchor="middle" fill="#ffffff">
    gorillasmokegrill.com
  </text>
</svg>